<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTCUSDT Futures Price</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="price-panel" aria-live="polite">
        <p class="label">Binance BTCUSDT Futures</p>
        <h1 id="btc-price">Loading...</h1>
        <div class="meta-row">
          <p id="price-time" class="meta">Fetching latest price</p>
        </div>
        <div class="market-info">
          <p>UTC日涨幅：<span id="day-change">--</span></p>
          <p>资金费率年化：<span id="funding-annualized">--</span></p>
        </div>
        <div class="account-info">
          <p>1. 币安的账户余额：<span id="account-balance">未读取</span></p>
          <p>2. 币安的仓位RNL：<span id="account-pnl">未读取</span></p>
          <div id="position-info" class="position-info">
            <p>
              开仓价格：<span id="position-entry">--</span>
              <span class="inline-divider">/</span>
              爆仓价格：<span id="position-liquidation">--</span>
            </p>
            <p>仓位大小：<span id="position-size">--</span></p>
            <p>未实现盈亏：<span id="unrealized-pnl">--</span></p>
            <p>已实现盈亏：<span id="realized-pnl">--</span></p>
          </div>
        </div>
      </section>
    </main>

    <script>
      const MARKET_API_URL =
        "https://hello-word-h5-api-sg.onrender.com/api/market/btcusdt";
      const PRICE_API_URL =
        "https://hello-word-h5-api-sg.onrender.com/api/price/btcusdt";
      const ACCOUNT_API_URL =
        "https://hello-word-h5-api-sg.onrender.com/api/binance/account?symbol=BTCUSDT";
      const REFRESH_SECONDS = 5;
      const priceElement = document.getElementById("btc-price");
      const timeElement = document.getElementById("price-time");
      const dayChangeElement = document.getElementById("day-change");
      const fundingAnnualizedElement =
        document.getElementById("funding-annualized");
      const accountBalanceElement = document.getElementById("account-balance");
      const accountPnlElement = document.getElementById("account-pnl");
      const positionEntryElement = document.getElementById("position-entry");
      const positionSizeElement = document.getElementById("position-size");
      const positionLiquidationElement = document.getElementById(
        "position-liquidation",
      );
      const unrealizedPnlElement = document.getElementById("unrealized-pnl");
      const realizedPnlElement = document.getElementById("realized-pnl");
      let isUpdating = false;

      function formatPrice(price) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        }).format(price);
      }

      function formatTime(date) {
        return new Intl.DateTimeFormat("en-US", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        }).format(date);
      }

      function formatNumber(value, digits = 2) {
        const number = Number(value);

        if (!Number.isFinite(number)) {
          return "--";
        }

        return new Intl.NumberFormat("en-US", {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits,
        }).format(number);
      }

      function formatPercent(value) {
        const number = Number(value);

        if (!Number.isFinite(number)) {
          return "--";
        }

        const sign = number > 0 ? "+" : "";
        return `${sign}${formatNumber(number, 2)}%`;
      }

      function setValueClass(element, value) {
        const number = Number(value);
        element.classList.remove("is-positive", "is-negative", "is-neutral");

        if (!Number.isFinite(number) || number === 0) {
          element.classList.add("is-neutral");
          return;
        }

        element.classList.add(number > 0 ? "is-positive" : "is-negative");
      }

      async function updateMarketInfo() {
        try {
          const response = await fetch(MARKET_API_URL, { cache: "no-store" });

          if (!response.ok) {
            const fallbackResponse = await fetch(PRICE_API_URL, {
              cache: "no-store",
            });

            if (!fallbackResponse.ok) {
              throw new Error(`API returned ${response.status}`);
            }

            const fallbackData = await fallbackResponse.json();
            priceElement.textContent = formatPrice(fallbackData.price);
            dayChangeElement.textContent = "--";
            fundingAnnualizedElement.textContent = "--";
            setValueClass(dayChangeElement, null);
            setValueClass(fundingAnnualizedElement, null);
            timeElement.textContent = `Last updated ${formatTime(new Date())}`;
            return;
          }

          const data = await response.json();
          priceElement.textContent = formatPrice(data.price);
          dayChangeElement.textContent = formatPercent(
            data.utcDayChangePercent,
          );
          setValueClass(dayChangeElement, data.utcDayChangePercent);
          fundingAnnualizedElement.textContent = formatPercent(
            data.fundingAnnualizedPercent,
          );
          setValueClass(
            fundingAnnualizedElement,
            data.fundingAnnualizedPercent,
          );
          timeElement.textContent = `Last updated ${formatTime(new Date())}`;
        } catch (error) {
          timeElement.textContent = "Unable to load price. Retrying...";
          console.error(error);
        }
      }

      function renderEmptyAccount(message) {
        accountBalanceElement.textContent = message;
        accountPnlElement.textContent = "--";
        positionEntryElement.textContent = "--";
        positionSizeElement.textContent = "--";
        positionLiquidationElement.textContent = "--";
        unrealizedPnlElement.textContent = "--";
        realizedPnlElement.textContent = "--";
        setValueClass(accountPnlElement, null);
        setValueClass(unrealizedPnlElement, null);
        setValueClass(realizedPnlElement, null);
      }

      async function updateAccountInfo() {
        accountBalanceElement.textContent = "读取中...";

        try {
          const response = await fetch(ACCOUNT_API_URL, { cache: "no-store" });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || `API returned ${response.status}`);
          }

          const usdtBalance =
            data.balances.find((balance) => balance.asset === "USDT") ||
            data.balances[0];
          const btcPosition =
            data.positions.find((position) => position.symbol === "BTCUSDT") ||
            data.positions[0];

          accountBalanceElement.textContent = usdtBalance
            ? `${formatNumber(usdtBalance.totalWalletBalance || usdtBalance.balance, 2)} ${usdtBalance.asset}`
            : "无余额";

          if (!btcPosition) {
            accountPnlElement.textContent = "无持仓";
            positionEntryElement.textContent = "--";
            positionSizeElement.textContent = "--";
            positionLiquidationElement.textContent = "--";
            unrealizedPnlElement.textContent = "--";
            realizedPnlElement.textContent = `${formatNumber(data.realizedPnl, 2)} ${data.realizedPnlAsset || "USDT"}`;
            setValueClass(accountPnlElement, null);
            setValueClass(unrealizedPnlElement, null);
            setValueClass(realizedPnlElement, data.realizedPnl);
            return;
          }

          accountPnlElement.textContent = `${formatNumber(btcPosition.pnl, 2)} ${btcPosition.marginAsset || "USDT"}`;
          setValueClass(accountPnlElement, btcPosition.pnl);
          positionEntryElement.textContent = formatNumber(
            btcPosition.entryPrice,
            2,
          );
          positionSizeElement.textContent = `${btcPosition.positionAmt} BTC`;
          positionLiquidationElement.textContent = formatNumber(
            btcPosition.liquidationPrice,
            2,
          );
          unrealizedPnlElement.textContent = `${formatNumber(btcPosition.pnl, 2)} ${btcPosition.marginAsset || "USDT"}`;
          realizedPnlElement.textContent = `${formatNumber(data.realizedPnl, 2)} ${data.realizedPnlAsset || "USDT"}`;
          setValueClass(unrealizedPnlElement, btcPosition.pnl);
          setValueClass(realizedPnlElement, data.realizedPnl);
        } catch (error) {
          renderEmptyAccount(`读取失败：${error.message}`);
          console.error(error);
        }
      }

      async function updateDashboard() {
        if (isUpdating) {
          return;
        }

        isUpdating = true;

        try {
          await Promise.all([updateMarketInfo(), updateAccountInfo()]);
        } finally {
          isUpdating = false;
        }
      }

      updateDashboard();
      setInterval(updateDashboard, REFRESH_SECONDS * 1000);
    </script>
  </body>
</html>
